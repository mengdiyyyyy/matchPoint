<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Matchpoint</title>

<!-- ============================================================
  FIREBASE SETUP — 免费，40人绰绰有余

  步骤（5分钟）：
  1. 打开 https://console.firebase.google.com/
  2. 新建项目（随便起名）→ 点「</> 网页」→ 复制 firebaseConfig
  3. Firestore Database → 创建数据库（测试模式）
  4. 把下面 FIREBASE_CONFIG 里的值替换成你的

  Firestore 安全规则（测试模式自动允许，无需额外设置）
  免费套餐：50,000 读/天，20,000 写/天，40人完全够用
  ============================================================ -->
<script>
  const FIREBASE_CONFIG = {
    apiKey: "",
    authDomain: "",
    projectId: "",
    storageBucket: "",
    messagingSenderId: "",
    appId: ""
  };
  // 所有打开此页面的人自动进入同一个池（班级/活动名称，可自定义）
  const POOL_ID = "matchpoint_class_01";
  const FIREBASE_ENABLED = !!FIREBASE_CONFIG.apiKey;
</script>
<script>
  // Load Firebase only if configured
  if (window.FIREBASE_ENABLED) {
    document.write('<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"><\/script>');
    document.write('<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"><\/script>');
  }
</script>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",Arial,sans-serif;
  background:#e5e7eb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
}
.device-frame{
  width:390px;height:844px;background:#fff;border-radius:44px;
  box-shadow:0 24px 64px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.08);
  overflow:hidden;position:relative;display:flex;flex-direction:column;flex-shrink:0;
}
@media(max-width:480px){body{padding:0;}.device-frame{width:100vw;height:100vh;border-radius:0;box-shadow:none;}}
.status-bar{height:44px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:#1a1a2e;flex-shrink:0;}
.sb-right{display:flex;gap:4px;align-items:center;font-size:11px;}
.page-container{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.page-container::-webkit-scrollbar{width:0;}

/* === TAB BAR === */
.tab-bar{height:72px;background:#fff;border-top:1px solid #f0f0f5;display:flex;align-items:stretch;padding:6px 0 16px;flex-shrink:0;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#9ca3af;position:relative;transition:color .2s;}
.tab-item.active{color:#3B5BF6;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:10px;font-weight:500;}
.tab-item.active .tab-label{font-weight:700;}
.tab-dot{position:absolute;top:2px;right:calc(50% - 18px);width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff;}

/* === SHARED COMPONENTS === */
.btn{width:100%;padding:14px;background:#3B5BF6;color:#fff;font-size:15px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:opacity .15s;}
.btn:active{opacity:.85;}
.btn.ghost{background:#EEF2FF;color:#3B5BF6;}
.btn.sm{padding:9px 16px;font-size:13px;border-radius:12px;width:auto;}
.chip{padding:7px 14px;border-radius:20px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;color:#555;cursor:pointer;transition:all .18s;}
.chip.sel{background:#EEF2FF;border-color:#3B5BF6;color:#3B5BF6;font-weight:600;}
.chips{display:flex;flex-wrap:wrap;gap:8px;}
.text-inp{width:100%;padding:13px 16px;border:1.5px solid #e5e7eb;border-radius:14px;font-size:16px;color:#1a1a2e;outline:none;transition:border-color .2s;}
.text-inp:focus{border-color:#3B5BF6;}

/* === DYNAMIC ISLAND (scanning progress pill) ===
   position:fixed so it stays anchored to the top of the viewport
   regardless of which tab is rendered or how the user scrolled. */
.dyn-island{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  background:#0f0f14;color:#fff;border-radius:24px;
  padding:8px 18px;display:flex;align-items:center;gap:10px;
  font-size:12px;font-weight:600;z-index:9999;
  box-shadow:0 8px 28px rgba(0,0,0,.35);
  min-width:240px;max-width:340px;
  animation:diSlide .3s ease;
  transition:width .25s ease;
}
.dyn-island .di-spinner{
  width:14px;height:14px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);border-top-color:#7c93ff;
  animation:diSpin 0.9s linear infinite;flex-shrink:0;
}
.dyn-island .di-text{flex:1;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dyn-island .di-sub{font-size:10px;color:#9ba0b3;font-weight:500;margin-top:1px;}
.dyn-island .di-bar{height:3px;background:rgba(255,255,255,.12);border-radius:2px;margin-top:6px;overflow:hidden;}
.dyn-island .di-bar-fill{height:100%;background:linear-gradient(90deg,#7c93ff,#a7b9ff);border-radius:2px;transition:width .2s ease;}
.dyn-island .di-done{font-size:14px;flex-shrink:0;}
@keyframes diSlide{from{opacity:0;transform:translateX(-50%) translateY(-8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes diSpin{to{transform:rotate(360deg);}}

/* === TOASTS === */
.toast-wrap{position:absolute;bottom:86px;left:0;right:0;z-index:999;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px;}
.toast{background:rgba(26,26,46,.85);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;backdrop-filter:blur(10px);animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.slide-up{animation:slideUp .22s ease;}

/* ===================== SPLASH ===================== */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;padding:40px 28px;background:#fff;}
.splash-logo{font-size:52px;margin-bottom:8px;}
.splash-brand{font-size:30px;font-weight:800;color:#1a1a2e;margin-bottom:4px;}
.splash-hero{width:100%;max-width:360px;height:auto;display:block;margin:0 auto 20px;}
.splash-sub{font-size:14px;color:#888;margin-bottom:44px;text-align:center;}
.splash-field{width:100%;margin-bottom:14px;}
.splash-label{font-size:13px;font-weight:600;color:#555;margin-bottom:7px;display:block;}
.splash-hint{font-size:12px;color:#bbb;margin-top:14px;text-align:center;line-height:1.7;}
.divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:#ddd;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#eee;}
.room-row{display:flex;gap:10px;margin-bottom:14px;}
.room-inp{flex:1;padding:13px 16px;border:1.5px solid #e5e7eb;border-radius:14px;font-size:18px;font-weight:700;letter-spacing:5px;color:#1a1a2e;outline:none;}
.room-inp:focus{border-color:#3B5BF6;}
.firebase-notice{margin-top:12px;padding:12px 14px;background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;font-size:12px;color:#92400e;line-height:1.6;}
.firebase-notice a{color:#3B5BF6;}

/* ===================== ONBOARDING ===================== */
.ob-page{display:flex;flex-direction:column;height:100%;background:#fff;}
.ob-top{padding:10px 16px 8px;border-bottom:1px solid #f0f0f5;flex-shrink:0;}
.ob-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
.ob-tabs::-webkit-scrollbar{height:0;}
.ob-tab{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid #e5e7eb;font-size:13px;white-space:nowrap;cursor:pointer;flex-shrink:0;background:#fff;color:#666;position:relative;}
.ob-tab.active{background:#EEF2FF;border-color:#3B5BF6;color:#3B5BF6;font-weight:600;}
.ob-tab.done{background:#F0FDF4;border-color:#22c55e;color:#16a34a;}
.ob-done-dot{position:absolute;bottom:-3px;right:-3px;width:14px;height:14px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;border:2px solid #fff;}
.ob-progress{font-size:11px;color:#3B5BF6;font-weight:700;margin-top:6px;}
.ob-chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.ob-chat::-webkit-scrollbar{width:0;}

/* Chat bubbles */
.msg-bot{display:flex;gap:10px;align-items:flex-end;}
.bot-ava{width:32px;height:32px;border-radius:50%;background:#3B5BF6;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.bubble-bot{background:#F0F3FF;color:#1a1a2e;padding:11px 15px;border-radius:18px 18px 18px 4px;font-size:14px;line-height:1.6;max-width:76%;}
.msg-user{display:flex;justify-content:flex-end;}
.bubble-user{background:#3B5BF6;color:#fff;padding:11px 15px;border-radius:18px 18px 4px 18px;font-size:14px;line-height:1.6;max-width:76%;}
.sport-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.sport-card{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border-radius:12px;border:1.5px solid #e5e7eb;cursor:pointer;transition:all .2s;background:#fff;font-size:11px;color:#666;text-align:center;}
.sport-card .se{font-size:22px;}
.sport-card.sel{background:#EEF2FF;border-color:#3B5BF6;color:#3B5BF6;font-weight:600;}
.ob-text-row{display:flex;gap:8px;}
.ob-text-input{flex:1;padding:9px 13px;background:#f8f9fc;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;}
.ob-text-input:focus{border-color:#3B5BF6;}
.ob-save{padding:9px 16px;background:#3B5BF6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}

/* ===================== ME ===================== */
.me-page{padding-bottom:32px;}
.me-header{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:flex-start;}
.me-header h1{font-size:26px;font-weight:800;color:#1a1a2e;}
.me-edit-btn{padding:7px 14px;background:#EEF2FF;color:#3B5BF6;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;}
.me-user-row{display:flex;align-items:center;gap:16px;padding:18px 20px 0;}
.me-ava{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6c63ff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;flex-shrink:0;}
.me-name{font-size:20px;font-weight:800;color:#1a1a2e;}
.me-role{font-size:13px;color:#888;margin-top:3px;}
.me-room-tag{display:inline-flex;align-items:center;gap:5px;margin-top:6px;padding:3px 10px;background:#EEF2FF;border-radius:20px;font-size:12px;color:#3B5BF6;font-weight:600;cursor:pointer;}
.sport-tabs{display:flex;gap:8px;flex-wrap:wrap;padding:16px 20px 0;}
.sport-tab{padding:7px 16px;border-radius:20px;border:1.5px solid #e5e7eb;font-size:13px;font-weight:500;color:#555;cursor:pointer;transition:all .2s;background:#fff;}
.sport-tab.active{background:#EEF2FF;border-color:#3B5BF6;color:#3B5BF6;font-weight:700;}
.stats-card{margin:14px 20px 0;background:#F0F3FF;border-radius:16px;padding:16px 8px;display:grid;grid-template-columns:repeat(3,1fr);}
.stat-cell{text-align:center;}
.stat-icon{font-size:16px;margin-bottom:5px;}
.stat-num{font-size:20px;font-weight:800;color:#1a1a2e;}
.stat-unit{font-size:11px;color:#999;margin-left:1px;}
.stat-label{font-size:11px;color:#aaa;margin-top:2px;}
.sport-prefs{padding:14px 20px 0;}
.prefs-title{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.prefs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.pref-card{background:#f8f9fc;border-radius:12px;padding:12px 14px;}
.pref-label{font-size:11px;color:#aaa;margin-bottom:3px;}
.pref-val{font-size:14px;font-weight:700;color:#1a1a2e;}
.redline-card{background:#FFF8EC;border-left:3px solid #F59E0B;border-radius:0 10px 10px 0;padding:9px 14px;font-size:12px;color:#92400e;line-height:1.6;}
.me-section{padding:18px 20px 0;}
.me-section-title{font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.quick-btns{display:flex;gap:8px;flex-wrap:wrap;}
.quick-btn{padding:7px 14px;background:#EEF2FF;color:#3B5BF6;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;}
.me-rows{padding:14px 20px 0;display:flex;flex-direction:column;gap:10px;}
.me-row{display:flex;align-items:center;gap:12px;padding:14px;background:#f8f9fc;border-radius:14px;cursor:pointer;}
.me-row-icon{font-size:18px;}
.me-row-text{font-size:15px;font-weight:600;color:#1a1a2e;}
.me-row-arrow{margin-left:auto;font-size:16px;color:#ccc;}

/* ===================== AI PAGE ===================== */
.ai-page{display:flex;flex-direction:column;height:100%;}
.ai-header{padding:16px 20px 12px;border-bottom:1px solid #f0f0f5;flex-shrink:0;}
.ai-header h1{font-size:24px;font-weight:800;color:#1a1a2e;}
.ai-header-row{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.ai-status{display:flex;align-items:center;gap:6px;font-size:12px;color:#22c55e;font-weight:600;}
.ai-status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;}
.ai-pool-tag{padding:4px 12px;background:#f8f9fc;border-radius:20px;font-size:12px;color:#888;}
.ai-chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.ai-chat::-webkit-scrollbar{width:0;}
.ai-msg-ai{display:flex;gap:10px;align-items:flex-start;}
.ai-ava{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3B5BF6,#818cf8);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.ai-bubble-ai{background:#F0F3FF;color:#1a1a2e;padding:11px 15px;border-radius:4px 18px 18px 18px;font-size:14px;line-height:1.6;max-width:78%;}
.ai-msg-user{display:flex;justify-content:flex-end;}
.ai-bubble-user{background:#3B5BF6;color:#fff;padding:11px 15px;border-radius:18px 4px 18px 18px;font-size:14px;line-height:1.6;max-width:78%;}
.ai-sys{text-align:center;}
.ai-sys-tag{display:inline-block;padding:4px 12px;background:#f0f0f5;border-radius:20px;font-size:11px;color:#aaa;}

/* Condition card (AI generates this) */
.cond-card{background:#fff;border:1.5px solid #c7d2fe;border-radius:16px;overflow:hidden;margin-top:4px;max-width:78%;}
.cond-header{background:#EEF2FF;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#3B5BF6;}
.cond-rows{padding:10px 14px;}
.cond-row{display:flex;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid #f5f5f8;font-size:13px;}
.cond-row:last-child{border-bottom:none;}
.cond-key{color:#aaa;width:56px;flex-shrink:0;}
.cond-val{color:#1a1a2e;font-weight:600;}
.cond-actions{display:flex;gap:8px;padding:8px 14px 12px;}
.cond-btn-no{flex:1;padding:8px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-size:13px;color:#888;cursor:pointer;}
.cond-btn-yes{flex:2;padding:8px;background:#3B5BF6;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;}

/* Searching animation */
.ai-searching{display:flex;gap:5px;align-items:center;padding:11px 15px;background:#F0F3FF;border-radius:4px 18px 18px 18px;width:fit-content;}
.ai-searching span{width:6px;height:6px;border-radius:50%;background:#3B5BF6;animation:tp 1.2s ease-in-out infinite;}
.ai-searching span:nth-child(2){animation-delay:.2s;}
.ai-searching span:nth-child(3){animation-delay:.4s;}
@keyframes tp{0%,60%,100%{transform:scale(.7);opacity:.4;}30%{transform:scale(1.2);opacity:1;}}

/* Result cards from AI scan */
.ai-result-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:14px;max-width:88%;margin-top:4px;}
.arc-name-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.arc-ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#818cf8,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;}
.arc-name{font-size:15px;font-weight:700;color:#1a1a2e;}
.arc-score{margin-left:auto;font-size:13px;font-weight:800;color:#3B5BF6;}
.arc-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.arc-tag{padding:3px 9px;border-radius:8px;font-size:11px;background:#f4f6ff;color:#555;}
.arc-tag.match{background:#F0FDF4;color:#16a34a;}
.arc-actions{display:flex;gap:8px;}
.arc-btn-pass{flex:1;padding:8px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;font-size:12px;color:#888;cursor:pointer;}
.arc-btn-invite{flex:2;padding:8px;background:#3B5BF6;color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;}

/* AI input */
.ai-input-bar{padding:10px 16px 14px;background:#fff;border-top:1px solid #f0f0f5;display:flex;gap:10px;align-items:center;flex-shrink:0;}
.ai-input{flex:1;padding:10px 16px;background:#f4f6ff;border:none;border-radius:24px;font-size:14px;color:#1a1a2e;outline:none;}
.ai-input::placeholder{color:#bbb;}
.ai-send{width:40px;height:40px;border-radius:50%;background:#3B5BF6;border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ===================== CHATS ===================== */
.chats-page{padding-bottom:16px;}
.chats-header{padding:20px 20px 16px;}
.chats-header h1{font-size:26px;font-weight:800;color:#1a1a2e;}
.chats-header .ch-sub{font-size:12px;color:#aaa;margin-top:3px;}
.chat-list{padding:0 16px;}
.chat-item{display:flex;gap:13px;align-items:center;padding:14px 4px;border-bottom:1px solid #f5f5f8;cursor:pointer;}
.chat-item:last-child{border-bottom:none;}
.ci-ava-wrap{position:relative;flex-shrink:0;}
.ci-ava{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;}
.ci-dot{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;border:2px solid #fff;}
.ci-dot.active{background:#22c55e;} .ci-dot.pending{background:#f59e0b;} .ci-dot.ai{background:#3B5BF6;}
.ci-info{flex:1;min-width:0;}
.ci-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.ci-name{font-size:15px;font-weight:700;color:#1a1a2e;}
.ci-time{font-size:11px;color:#bbb;}
.ci-msg{font-size:13px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.ci-badges{display:flex;gap:6px;}
.ci-badge{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.ci-badge.a2a{background:#EEF2FF;color:#3B5BF6;}
.ci-badge.confirmed{background:#F0FDF4;color:#16a34a;}
.ci-badge.pending{background:#FFF8EC;color:#B45309;}
.ci-badge.no-match{background:#f4f4f5;color:#999;}
.ci-unread{min-width:20px;height:20px;background:#3B5BF6;border-radius:10px;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0;}
.ci-match-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px #fff,0 1px 3px rgba(0,0,0,.15);}

/* Chat detail */
.chat-detail{display:flex;flex-direction:column;height:100%;}
.cd-header{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f5;flex-shrink:0;}
.cd-back{font-size:24px;color:#3B5BF6;cursor:pointer;line-height:1;}
.cd-ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;}
.cd-name{font-size:15px;font-weight:700;color:#1a1a2e;}
.cd-sub{font-size:11px;color:#3B5BF6;margin-top:2px;}
.cd-actions{margin-left:auto;display:flex;gap:14px;font-size:20px;cursor:pointer;}
.cd-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.cd-msgs::-webkit-scrollbar{width:0;}
.dmsg-sys{text-align:center;}
.dmsg-sys-tag{display:inline-block;padding:3px 12px;background:#f0f0f5;border-radius:20px;font-size:11px;color:#aaa;}
.dmsg-row{display:flex;gap:8px;align-items:flex-end;}
.dmsg-row.r{flex-direction:row-reverse;}
.dmsg-ava{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.dmsg-bubble{padding:10px 14px;border-radius:14px 14px 14px 4px;font-size:13px;max-width:74%;background:#f4f6ff;color:#1a1a2e;line-height:1.6;}
.dmsg-row.r .dmsg-bubble{background:#3B5BF6;color:#fff;border-radius:14px 14px 4px 14px;}
.dmsg-label{font-size:10px;color:#bbb;margin:0 10px 3px;text-align:left;}
.dmsg-label.r{text-align:right;}
.cd-input-bar{padding:10px 16px 14px;background:#fff;border-top:1px solid #f0f0f5;display:flex;gap:10px;align-items:center;flex-shrink:0;}
.cd-input{flex:1;padding:9px 14px;background:#f4f6ff;border:none;border-radius:22px;font-size:14px;color:#aaa;outline:none;}
.cd-send{width:36px;height:36px;border-radius:50%;background:#3B5BF6;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}

/* No-match chat detail — muted "archive" look */
.chat-detail.unmatched .dmsg-row.r .dmsg-bubble{background:#d1d5db;color:#4b5563;}
.chat-detail.unmatched .dmsg-bubble{background:#f0f0f5;color:#6b7280;}
.chat-detail.unmatched .dmsg-sys-tag{background:#ececf2;color:#9ca3af;}
.cd-archived-bar{padding:14px 16px;background:#fafafb;border-top:1px solid #f0f0f5;font-size:12px;color:#9ca3af;text-align:center;line-height:1.6;flex-shrink:0;}

/* Firebase setup banner */
.setup-banner{margin:12px 16px;padding:14px 16px;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:14px;font-size:12px;color:#92400e;line-height:1.7;}
.setup-banner strong{color:#b45309;}
.setup-banner a{color:#3B5BF6;}
</style>

// TECH_DIMS WEIGHTS — each sport's dims sum to 10 points.
// No single dim is a hard veto; everything is weighted percentage.
// ============================================================
const TECH_WEIGHTS = {
  badminton:[3,5,2], tennis:[3,5,2], basketball:[5,5], running:[6,4],
  fitness:[3,5,2], skiing:[2,3,1,2,2], pingpong:[3,5,2], football:[3,2,5],
  swimming:[2,4,4], cycling:[2,4,1,3], hiking:[3,2,2,3], volleyball:[3,4,3],
  pickleball:[3,5,2], bowling:[3,7], climbing:[2,4,3,1], frisbee:[2,4,3,1],
  paddleboard:[1,6,3], orienteering:[5,3,2], billiards:[4,6], yoga:[3,3,4],
};
Object.entries(TECH_WEIGHTS).forEach(([k, arr]) => {
  (TECH_DIMS[k] || []).forEach((d, i) => { d.weight = arr[i] || 1; });
});

// Verdict → fraction-of-weight earned. NO verdict is a hard veto.
const VERDICT_PCT = { match:1.0, flex:0.8, gap:0.5, conflict:0, skip:null };

// ============================================================
// COMPARISON ENGINE — real data-driven matching
// ============================================================
// Split a possibly-multi value ("单打、双打") into a list. Single values come back as 1-element arrays.
function splitMulti(v) {
  if (v == null) return [];
  return String(v).split(/[、,，]/).map(s=>s.trim()).filter(Boolean);
}

function compareDimension(dim, myA, theirA) {
  // Empty answer → skip
  if (!myA || !theirA) return {verdict:'skip', myA, theirA};
  const flex = dim.flex || [];
  // Generic flex tokens always considered flexible regardless of dim config
  const GLOBAL_FLEX = ['都可以','都行','看情况','随意'];
  const isFlexVal = v => flex.includes(v) || GLOBAL_FLEX.includes(v);

  const myList = splitMulti(myA);
  const theirList = splitMulti(theirA);
  const myFlex = myList.some(isFlexVal);
  const theirFlex = theirList.some(isFlexVal);

  if (dim.type === 'cat') {
    // Set-intersection match
    const shared = myList.filter(v => theirList.includes(v));
    if (shared.length) return {verdict:'match', myA, theirA};
    if (myFlex || theirFlex) return {verdict:'flex', myA, theirA};
    return {verdict:'conflict', myA, theirA};
  }

  if (dim.type === 'ord') {
    // Find best (minimum) gap across all cross-pairs
    const shared = myList.filter(v => theirList.includes(v));
    if (shared.length) return {verdict:'match', myA, theirA};
    if (myFlex || theirFlex) return {verdict:'flex', myA, theirA};
    let minGap = Infinity;
    for (const m of myList) {
      const mi = dim.order.indexOf(m); if (mi < 0) continue;
      for (const t of theirList) {
        const ti = dim.order.indexOf(t); if (ti < 0) continue;
        minGap = Math.min(minGap, Math.abs(mi - ti));
      }
    }
    if (minGap === Infinity) return {verdict:'flex', myA, theirA};
    if (minGap === 0) return {verdict:'match', myA, theirA};
    if (minGap <= (dim.maxGap || 1)) return {verdict:'gap', myA, theirA, gap:minGap};
    return {verdict:'conflict', myA, theirA, gap:minGap};
  }

  if (dim.type === 'venue') {
    // Substring overlap (≥2 chars match) counts as same venue
    const a = myA.trim(), b = theirA.trim();
    if (!a || !b) return {verdict:'skip', myA, theirA};
    if (a === b) return {verdict:'match', myA, theirA};
    // Token overlap
    const tokenize = s => s.split(/[\s，、,/·]+/).filter(t=>t.length>=2);
    const ta = tokenize(a), tb = tokenize(b);
    const shared = ta.filter(t => tb.some(x => x.includes(t) || t.includes(x)));
    if (shared.length) return {verdict:'match', myA, theirA};
    if (a.includes(b) || b.includes(a)) return {verdict:'match', myA, theirA};
    return {verdict:'conflict', myA, theirA};
  }

  if (dim.type === 'oppose') {
    // Multi-aware: shared value → match; any pair on opposing sides → conflict; else flex
    const sharedOpp = myList.filter(v => theirList.includes(v));
    if (sharedOpp.length) return {verdict:'match', myA, theirA};
    const pairs = dim.pairs || [];
    const hit = myList.some(m => theirList.some(t => pairs.some(([x,y]) => (m===x && t===y) || (m===y && t===x))));
    if (hit) return {verdict:'conflict', myA, theirA};
    return {verdict:'flex', myA, theirA};
  }

  return {verdict:'skip', myA, theirA};
}

// Run all technical dims for a sport and return ordered comparison results
function compareProfiles(sportKey, myAnswers, theirAnswers) {
  const dims = TECH_DIMS[sportKey] || [];
  const results = [];
  let firstCriticalConflict = null;
  for (const dim of dims) {
    const myA = myAnswers[dim.qIdx]?.a || '';
    const theirA = theirAnswers[dim.qIdx]?.a || '';
    const cmp = compareDimension(dim, myA, theirA);
    const entry = {dim, ...cmp};
    results.push(entry);
    if (cmp.verdict === 'conflict' && dim.critical && !firstCriticalConflict) {
      firstCriticalConflict = entry;
    }
  }
  return {results, firstCriticalConflict};
}

function calcScore(me, other) {
  const myKeys = me.sports.map(s=>s.key);
  const otherKeys = (other.sports||[]).map(s=>s.key);
  const shared = myKeys.filter(k=>otherKeys.includes(k));
  if (!shared.length) return { score: 0, shared: [] };
  let score = shared.length * 20;
  shared.forEach(key => {
    const myS = me.sports.find(s=>s.key===key);
    const otherS = (other.sports||[]).find(s=>s.key===key);
    if (!myS || !otherS) return;
    const qs = SPORT_QS[key]||[];
    (myS.answers||[]).forEach((ans,i) => {
      const oa = (otherS.answers||[])[i]?.a||'';
      if (!ans.a || !oa) return;
      if (qs[i]?.type==='chips') {
        if (ans.a===oa) score+=12;
        else if (['都可以','都行','看情况'].some(x=>ans.a===x||oa===x)) score+=5;
      } else {
        const words=ans.a.split(/[\s，、]/);
        if (words.some(w=>w.length>1&&oa.includes(w))) score+=8;
      }
    });
  });
  const d1=me.timePref?.days||[], d2=other.timePref?.days||[];
  if (d1.some(d=>d2.includes(d))) score+=8;
  const t1=me.timePref?.times||[], t2=other.timePref?.times||[];
  if (t1.some(t=>t2.includes(t))) score+=8;
  return { score: Math.min(score, 100), shared };
}

function el(tag, attrs={}, kids=[]) {
  const e = document.createElement(tag);

  });
  [kids].flat().forEach(c=>c&&e.appendChild(typeof c==='string'?document.createTextNode(c):c));

// Tokens that act as "exclusive flexible/wildcard" choices in multi-select chips.
// Selecting one of these clears the rest; selecting another option clears these.
const FLEX_TOKENS = new Set(['都可以','都行','看情况','随意']);

function renderWidget(chat,q,key){
  if(q.type==='chips'){
    const cs=el('div',{class:'chips'});
    if (q.multi) {
      // Multi-select: track in-progress selection per (sport,qIdx)
      const qIdx = (S.sportProg[key]?.answers||[]).length;
      if (!S.tmpMulti) S.tmpMulti = {};
      const tmpKey = key + '_' + qIdx;
      const sel = S.tmpMulti[tmpKey] || [];
      q.opts.forEach(o => {
        cs.appendChild(el('div',{
          class:'chip'+(sel.includes(o)?' sel':''),
          onclick:()=>{
            let cur = (S.tmpMulti[tmpKey]||[]).slice();
            const isFlex = FLEX_TOKENS.has(o);
            if (isFlex) {
              cur = sel.includes(o) ? [] : [o];
            } else {
              cur = cur.filter(x => !FLEX_TOKENS.has(x));
              const i = cur.indexOf(o);
              if (i>=0) cur.splice(i,1); else cur.push(o);
            }
            S.tmpMulti[tmpKey] = cur;
            render();
          }
        }, o));
      });
      chat.appendChild(cs);
      // Hint + confirm button
      chat.appendChild(el('div',{style:'font-size:11px;color:#aaa;margin:6px 2px;',html:'可多选'}));
      if (sel.length > 0) {
        chat.appendChild(el('button',{
          class:'btn',
          style:'max-width:200px;margin:6px auto;display:block;',
          onclick:()=>{
            const joined = sel.join('、');
            delete S.tmpMulti[tmpKey];
            submitAns(joined, key);
          }
        }, '下一步 →'));
      }
    } else {
      q.opts.forEach(o=>cs.appendChild(el('div',{class:'chip',onclick:()=>submitAns(o,key)},o)));
      chat.appendChild(cs);
    }
  } else {
    const row=el('div',{class:'ob-text-row'});
    const inp=el('input',{class:'ob-text-input',placeholder:q.ph||'输入你的回答',type:'text'});
    inp.value=S.pendingText;
    inp.addEventListener('input',e=>S.pendingText=e.target.value);
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&S.pendingText.trim())submitAns(S.pendingText.trim(),key);});
    row.appendChild(inp); row.appendChild(el('button',{class:'ob-save',onclick:()=>{if(S.pendingText.trim())submitAns(S.pendingText.trim(),key);}},'保存'));
    chat.appendChild(row); setTimeout(()=>inp.focus(),50);
  }
}
function submitAns(a,key){
  const pr=S.sportProg[key],qs=SPORT_QS[key]||[];
  pr.answers.push({q:qs[pr.answers.length].q,a}); S.pendingText='';
  if(pr.answers.length>=qs.length)pr.complete=true;
  render();
}
function renderOBTime(chat){
  // Per-day time slots: timeByDay = {'周中': ['晚上'], '周末': ['上午','下午']}
  // The flat `times` array is a union of all selected slots (for legacy matching).
  if (!S.timePref.timeByDay) S.timePref.timeByDay = {};
  const flatten = () => {
    const s = new Set();
    Object.values(S.timePref.timeByDay).forEach(arr => arr.forEach(x => s.add(x)));
    S.timePref.times = [...s];
  };

  chat.appendChild(bMsg('最后一问：你周中/周末都什么时候方便运动？（可分别选）'));

  // Days picker — multi-select
  if (S.timePref.days.length > 0) chat.appendChild(uMsg(S.timePref.days.join('、')));
  const daysRow = el('div',{class:'chips'});
  ['周中','周末','都可以'].forEach(d=>{
    const isSel = (d==='都可以') ? (S.timePref.days.length===2) : S.timePref.days.includes(d);
    daysRow.appendChild(el('div',{
      class:'chip'+(isSel?' sel':''),
      onclick:()=>{
        if (d==='都可以') S.timePref.days=['周中','周末'];
        else {
          const arr = S.timePref.days.filter(x=>x!=='都可以');
          const i = arr.indexOf(d);
          if (i>=0) arr.splice(i,1); else arr.push(d);
          S.timePref.days = arr;
        }
        // Drop timeByDay entries for unselected days
        Object.keys(S.timePref.timeByDay).forEach(k=>{
          if (!S.timePref.days.includes(k)) delete S.timePref.timeByDay[k];
        });
        flatten();
        render();
      }
    }, d));
  });
  chat.appendChild(daysRow);
  if (S.timePref.days.length === 0) return;

  // For each selected day, render a SEPARATE multi-select row.
  // Order: 周中 first, then 周末.
  const orderedDays = ['周中','周末'].filter(d => S.timePref.days.includes(d));
  let allComplete = true;
  for (const day of orderedDays) {
    chat.appendChild(bMsg(`${day}什么时段？（可多选）`));
    const sel = S.timePref.timeByDay[day] || [];
    if (sel.length > 0) chat.appendChild(uMsg(sel.join('、')));
    const row = el('div',{class:'chips'});
    ['上午','下午','晚上','都可以'].forEach(t=>{
      const isSel = (t==='都可以') ? (sel.length===3) : sel.includes(t);

// ============================================================
// A2A CONVERSATION ENGINE — driven by real data comparison
// ============================================================
// Rules:
//  - Time is NOT a matching axis (time is treated as flexible).
//  - Each round compares ONE technical dimension from TECH_DIMS.
//  - Comparison verdict drives what each agent says.
//  - Critical conflict → early exit + red-line system message.
//  - Final verdict computed from real per-dim counts.
// ============================================================
function fmt(tmpl, my, their, gap) {
  return (tmpl||'').replace(/\{my\}/g, my||'-').replace(/\{their\}/g, their||'-').replace(/\{gap\}/g, gap||'');
}

// Extra rounds for SAME sport — uses SPORT_QS answers NOT covered by TECH_DIMS.
// These are "soft" technical dimensions (e.g. distance for running when only pace
// is critical, venue text, secondary preferences) — surfaced as natural follow-up.
function buildExtraSameSportRounds(key, myAnswers, theirAnswers, maxRounds = 2) {
  const covered = new Set((TECH_DIMS[key] || []).map(d => d.qIdx));
  const qs = SPORT_QS[key] || [];
  const rounds = [];
  for (let i = 0; i < qs.length && rounds.length < maxRounds; i++) {
    if (covered.has(i)) continue;
    const q = qs[i];
    const myA = myAnswers[i]?.a, theirA = theirAnswers[i]?.a;
    if (!myA || !theirA) continue;
    const labelHint = q.q.replace(/？$/, '');

    if (myA === theirA) {
      rounds.push({
        mine: `顺便：${labelHint} 我是「${myA}」`,
        their: `「${theirA}」，居然一样 ✅`,
      });
      continue;
    }

    // Venue-style text: token overlap detection
    if (q.type === 'text') {
      const tokenize = s => s.split(/[\s，,、/·]+/).filter(t => t.length >= 2);
      const ta = tokenize(myA), tb = tokenize(theirA);
      const overlap = ta.some(t => tb.some(x => x.includes(t) || t.includes(x))) || myA.includes(theirA) || theirA.includes(myA);
      if (overlap) {
        rounds.push({
          mine: `${labelHint} 我在「${myA}」`,
          their: `我在「${theirA}」，位置也算重叠 ✅`,
        });
      } else {
        rounds.push({
          mine: `${labelHint} 我常去「${myA}」，你呢？`,
          their: `我「${theirA}」，地点稍有差距，可以协调一下场地。`,
        });
      }
      continue;
    }

    // Categorical secondary preference: mention it without judging
    const flexSet = new Set(['都可以','都行','看情况','随意','偶尔','有时候']);
    const myFlex = flexSet.has(myA), theirFlex = flexSet.has(theirA);
    if (myFlex || theirFlex) {
      rounds.push({
        mine: `还有 ${labelHint}：我「${myA}」`,
        their: `我「${theirA}」，比较灵活 👍`,
      });
    } else {
      rounds.push({
        mine: `${labelHint} 我「${myA}」`,
        their: `我「${theirA}」，偏好不同但不是硬条件，可以试试看。`,
      });
    }
  }
  return rounds;
}

// Cross-sport common ground: shared other sports become extra "同频" signals
function buildCrossSportRounds(myProfile, theirProfile, currentSportKey, maxRounds = 2) {
  const mySports = (myProfile?.sports || []).map(s => s.key);
  const theirSports = new Set((theirProfile?.sports || []).map(s => s.key));
  const shared = mySports.filter(k => k !== currentSportKey && theirSports.has(k));
  const rounds = [];
  for (const k of shared.slice(0, maxRounds)) {
    const sp = SPORTS.find(s => s.key === k);
    if (!sp) continue;
    const myAns = (myProfile.sports.find(s => s.key === k)?.answers) || [];
    const theirAns = (theirProfile.sports.find(s => s.key === k)?.answers) || [];
    // Find the most informative critical tech dim with data on both sides
    const dims = TECH_DIMS[k] || [];
    const dim = dims.find(d => d.critical && myAns[d.qIdx]?.a && theirAns[d.qIdx]?.a)
             || dims.find(d => myAns[d.qIdx]?.a && theirAns[d.qIdx]?.a);

    if (!dim) {
      rounds.push({
        mine: `话说，看你档案里也有 ${sp.e}${sp.n} —— 我也玩这个，同频范围更大了。`,
        their: `是呀！下次可以一起开 ${sp.n} 的局 👍`,
      });
      continue;
    }
    const cmp = compareDimension(dim, myAns[dim.qIdx].a, theirAns[dim.qIdx].a);
    if (cmp.verdict === 'match' || cmp.verdict === 'flex') {
      rounds.push({
        mine: `话说你档案里也有 ${sp.e}${sp.n} —— ${dim.label} 我「${cmp.myA}」`,
        their: `巧了，我「${cmp.theirA}」，${sp.n} 这块也算同频 ✅`,
      });
    } else if (cmp.verdict === 'gap') {
      rounds.push({
        mine: `顺便看到你也玩 ${sp.e}${sp.n}，${dim.label} 我「${cmp.myA}」`,
        their: `我「${cmp.theirA}」，差一档能合，回头也可以约 👍`,
      });
    } else {
      rounds.push({
        mine: `话说你也玩 ${sp.e}${sp.n}，不过 ${dim.label} 我「${cmp.myA}」`,
        their: `我「${cmp.theirA}」，这块差距有点大，${sp.n} 不一定合得来，但本次约局没影响。`,
      });
    }
  }
  return rounds;
}

function buildA2AConversation(myName, theirName, sp, mySport, theirSport, myProfile, theirProfile) {
  const key = sp.key || (mySport?.key);
  const msgs = [];
  msgs.push({type:'sys', c:'A2A 对话 · AI 分身代发'});

  const myAnswers = mySport?.answers || [];
  const theirAnswers = theirSport?.answers || [];
  const dims = TECH_DIMS[key] || [];

  // No technical dimensions defined → cannot evaluate, mark unknown
  if (dims.length === 0) {
    msgs.push({type:'mine', c:`Hi！我是 ${myName} 的分身，找 ${sp.n} 同频朋友 ✦\n你档案里也有 ${sp.n}，来聊聊？`});
    msgs.push({type:'their', c:`你好，我是 ${theirName} 的分身。可以呀，我们交换一下细节。`});
    msgs.push({type:'sys', c:'⚠️ 该运动暂未配置技术维度，无法精确匹配'});
    return msgs;
  }

  // Run real comparison engine
  const {results} = compareProfiles(key, myAnswers, theirAnswers);

  // Opener — my agent introduces context grounded in profile
  msgs.push({type:'mine', c:`Hi！我是 ${myName} 的运动分身 ✦\n\n在找 ${sp.n} 的同频朋友，想从技术维度对一下：${dims.map(d=>d.label).join('、')}。\n\n一项一项过一下？`});
  msgs.push({type:'their', c:`好，我是 ${theirName} 的分身。逐项核对，分歧的也聊聊看怎么调。`});

  // Walk EVERY dim — no early exit; compute weighted score in parallel.
  let matches = 0, gaps = 0, flexes = 0, conflicts = 0, skipped = 0;
  let earned = 0, possible = 0;

  for (const r of results) {
    const d = r.dim;
    if (r.verdict === 'skip') { skipped++; continue; }
    const w = d.weight || 1;
    possible += w;
    const pct = VERDICT_PCT[r.verdict] ?? 0;
    earned += w * pct;

    // My agent asks, declaring own value
    msgs.push({type:'mine', c:`【${d.label}】` + fmt(d.ask, r.myA, r.theirA, r.gap)});

    // Their agent responds based on verdict — but conflicts no longer cut off.
    if (r.verdict === 'match') {
      msgs.push({type:'their', c:fmt(d.okMsg, r.myA, r.theirA, r.gap)});
      matches++;
    } else if (r.verdict === 'flex') {
      msgs.push({type:'their', c:fmt(d.flexMsg || d.okMsg, r.myA, r.theirA, r.gap)});
      flexes++;
    } else if (r.verdict === 'gap') {
      msgs.push({type:'their', c:fmt(d.gapMsg || d.okMsg, r.myA, r.theirA, r.gap)});
      gaps++;
    } else if (r.verdict === 'conflict') {
      msgs.push({type:'their', c:fmt(d.conflictMsg, r.myA, r.theirA, r.gap) + '（这条算分扣点，但还能继续看其它项）'});
      conflicts++;
    }
  }

  // Final score out of 10
  const score10 = possible > 0 ? Math.round((earned / possible) * 100) / 10 : 0;
  // Stamp in the wrap-up phase via a closure-style return — caller will read it from the chat's matchPercent field.
  msgs.__score10 = score10;

  // ===== Extra soft signals from the profile, when not red-lined =====
  // Cap total extra rounds so the conversation stays focused (<=10 rounds total).
  const usedTurns = matches + gaps + flexes; // already produced exchanges
  const remainingBudget = Math.max(0, 6 - usedTurns); // headroom for extras
  let extraBudget = Math.min(2, remainingBudget);
  let crossBudget = Math.min(2, remainingBudget - extraBudget);

  // Additional same-sport dimensions not covered by TECH_DIMS
  const extraSame = buildExtraSameSportRounds(key, myAnswers, theirAnswers, extraBudget);
  let softMatches = 0, softNotes = 0;
  for (const r of extraSame) {
    msgs.push({type:'mine', c:r.mine});
    msgs.push({type:'their', c:r.their});
    if (/✅|一样|重叠/.test(r.their)) softMatches++; else softNotes++;
  }

  // Cross-sport common ground (other shared sports — extra 同频 signals)
  const cross = buildCrossSportRounds(myProfile, theirProfile, key, crossBudget);
  for (const r of cross) {
    msgs.push({type:'mine', c:r.mine});
    msgs.push({type:'their', c:r.their});
    if (/✅|同频|一致|巧了/.test(r.their)) softMatches++; else softNotes++;
  }

  // Compose wrap-up driven by real counts
  const totalCovered = matches + gaps + flexes + conflicts;
  const isTechMatch = conflicts === 0 && (matches + flexes) >= Math.max(1, Math.ceil(totalCovered * 0.5));

  const softSummary = softMatches ? `；另外还有 ${softMatches} 个非硬条件的同频点` : '';
  // score10 was computed earlier in the dim-walking loop and saved on msgs.__score10
  const scoreLabel = `综合 ${msgs.__score10 || 0}/10 分`;

  if (score10 >= 7) {
    msgs.push({type:'mine', c:`${scoreLabel}：${matches} 项一致${flexes?`、${flexes} 项灵活兼容`:''}${gaps?`、${gaps} 项小差距`:''}${conflicts?`、${conflicts} 项有分歧`:''}${softSummary}。整体很合拍！`});
    msgs.push({type:'their', c:`同感 ✅ 玩起来肯定有的聊，你们自己继续吧。`});
    msgs.push({type:'sys', c:`✅ 技术同频 · ${scoreLabel}`});
  } else if (score10 >= 5) {
    msgs.push({type:'mine', c:`${scoreLabel}：${matches} 项一致${flexes?`、${flexes} 项兼容`:''}${gaps?`、${gaps} 项小差距`:''}${conflicts?`、${conflicts} 项分歧`:''}${softSummary}。能玩起来，分歧的部分实际玩时商量一下。`});
    msgs.push({type:'their', c:`同意，没有完全一样的，但可以一起玩 ✅`});
    msgs.push({type:'sys', c:`✅ 基本同频 · ${scoreLabel}`});
  } else {
    msgs.push({type:'mine', c:`${scoreLabel}：${matches} 项一致${flexes?`、${flexes} 项兼容`:''}${gaps?`、${gaps} 项差距`:''}${conflicts?`、${conflicts} 项分歧`:''}。差距偏大，玩起来节奏可能不太顺。`});
    msgs.push({type:'their', c:'同步保留，下次条件更近再聊。'});
    msgs.push({type:'sys', c:`⚠️ 暂不同频 · ${scoreLabel}`});
  }

  return msgs;
}

// Auto-initiate A2A chats for all matching users across all sports
// MATCH_THRESHOLD: chats with score >= threshold appear in main list (with
// green intensity reflecting fit); below threshold are minimized as "暂不同频".
const MATCH_THRESHOLD = 30;

// Scan for ONE specific sport. Two-stage matching:
//   Stage 1 (keyword filter): pool users who have this sport in their profile.
//   Stage 2 (technical match): for each, run buildA2AConversation to compare profiles.
// Anyone without the sport is filtered out — no agent chat is generated for them.
async function autoFindForSport(me, sportKey, focusHint) {
  // Concurrency guard — if a scan is already running, ignore this trigger.
  if (S.scanInProgress) return;
  S.scanInProgress = true;

  const users = await getPoolUsers();
  const sp = SPORTS.find(s => s.key === sportKey) || {key:sportKey, e:'🎾', n:sportKey};

  if (users.length === 0) {
    S.scanProgress = null; S.scanCompleted = true; S.scanInProgress = false;
    S.aiMsgs.push({type:'ai', c:'活动池里暂时没有其他人的档案。等大家都填完后再试。'});
    render(); return;
  }

  // STAGE 1: keyword filter by sport key
  const filtered = users.filter(u => (u.sports||[]).some(s => s.key === sportKey));
  if (filtered.length === 0) {
    S.scanProgress = null; S.scanCompleted = true; S.scanInProgress = false;
    S.aiMsgs.push({type:'ai', c:`活动池里暂时没有玩 ${sp.e} ${sp.n} 的同学。换个运动试试？`});
    render(); return;
  }

  // STAGE 2: build candidates with score for technical match
  const candidates = filtered.map(user => {
    const {score, shared} = calcScore(me, user);
    return {user, score, shared, sportKey};
  });

  if (candidates.length === 0) {
    S.scanProgress = null; S.scanCompleted = true; S.scanInProgress = false;
    render(); return;
  }

  // Initialize Dynamic Island progress
  S.scanProgress = {current: 0, total: candidates.length, name: '', done: false, sport: sp};
  render();

  // Pace the scan so the Dynamic Island is visible for at least 3 seconds.
  // Small candidate sets get slowed down so the user perceives the work.
  const MIN_SCAN_MS = 5000; // user-visible scan phase
  const perStepMs = Math.max(150, Math.floor(MIN_SCAN_MS / Math.max(1, candidates.length)));

  let matched = 0;
  let skippedDup = 0;   // 同人 + 同运动：直接跳过
  let mergedMulti = 0;  // 同人 + 新运动：合并到原 conversation
  try {
  for (let i = 0; i < candidates.length; i++) {
    const {user, score, shared, sportKey} = candidates[i];
    S.scanProgress = {current: i + 1, total: candidates.length, name: user.nickname, done: false, sport: sp};
    // Repaint every step so the island bar moves smoothly
    render();
    // Pace the scan — fill at least MIN_SCAN_MS regardless of candidate count
    await new Promise(r => setTimeout(r, perStepMs));

    // DEDUP: existing chat for the same person?
    const existing = S.a2aChats.find(c => c.uid === user.uid);
    const existingSportKeys = existing ? (existing.sportKeys || []) : [];
    // Same person + same sport → skip entirely (no new agent chat).
    if (existingSportKeys.includes(sportKey)) { skippedDup++; continue; }

    // Note: `sp` is the outer-scope sport already resolved before the loop.
    const myProfile = buildProfileObj();
    const mySportData = myProfile.sports.find(s=>s.key===sportKey)||{key:sportKey,answers:[]};
    const theirSportData = (user.sports||[]).find(s=>s.key===sportKey)||{key:sportKey,answers:[]};
    const a2aMsgs = buildA2AConversation(myProfile.nickname, user.nickname, sp, mySportData, theirSportData, myProfile, user);

    // Weighted-score decision (out of 10). >=5 → main list; <5 → minimized.
    const score10 = a2aMsgs.__score10 || 0;
    const score100 = Math.round(score10 * 10);  // 0-100 scale for color intensity
    const aboveThreshold = score10 >= 5;

    const lastText = a2aMsgs.filter(m=>m.type==='mine'||m.type==='their').slice(-1)[0]?.c || '';

    if (existing) {
      // Same person + new sport → append to the existing conversation.
      existing.messages = existing.messages || [];
      existing.messages.push({type:'sys', c:`换个运动聊聊 — ${sp.e} ${sp.n}`});
      existing.messages.push(...a2aMsgs);
      existing.sportKeys = [...existingSportKeys, sportKey];
      const labels = existing.sportKeys.map(k=>{const s=SPORTS.find(x=>x.key===k)||{e:'🎾',n:k};return s.e+' '+s.n;});
      existing.sport = labels.join(' · ');
      existing.preview = lastText.slice(0,40)+(lastText.length>40?'…':'');
      existing.timeAgo = '刚刚';
      if (aboveThreshold) existing.unread = (existing.unread||0)+1;
      if (score100 > (existing.score||0)) { existing.score = score100; existing.matchPercent = score10; }
      if (aboveThreshold && existing.status === 'no-match') existing.status = 'confirmed';
      // Bump to top of the list.
      S.a2aChats = [existing, ...S.a2aChats.filter(c => c !== existing)];
      lsSet('mp_chats_'+S.uid, S.a2aChats);
      if (db) { try { await db.collection('pools').doc(POOL_ID).collection('chats').doc(existing.id).set(existing); } catch(e){} }
      mergedMulti++;
      if (aboveThreshold) matched++;
    } else {
      const chat = {
        id:'c_'+Date.now().toString(36)+Math.random().toString(36).slice(2,5),
        uid:user.uid, name:user.nickname,
        sport:sp.e+' '+sp.n, sportKeys:[sportKey],
        score: score100, matchPercent: score10, shared,
        status: aboveThreshold ? 'confirmed' : 'no-match',
        unread: aboveThreshold ? 1 : 0,
        timeAgo:'刚刚',
        preview: lastText.slice(0,40)+(lastText.length>40?'…':''),
        messages: a2aMsgs,
      };
      await saveA2AChat(chat);
      if (aboveThreshold) matched++;
    }
  }
  } catch (e) {
    // Loop error — log, but still go through cleanup so the island doesn't get stuck.
    console.error('[autoFindForSport] scan loop error:', e);
  }

  // Hold the "done" pill on the island for ~2 seconds BEFORE pushing the
  // AI summary into chat — the island IS the immediate confirmation; the
  // chat bubble is the deferred next step.
  S.scanProgress = {current: candidates.length, total: candidates.length, done: true, matched, sport: sp};
  S.scanCompleted = true;
  render();
  await new Promise(r => setTimeout(r, 2500));

  // Always offer "去看看" button so the user can browse what the agents discussed —
  // even when no one cleared 5/10, the minimized chats reveal why each候选 didn't fit.
  const newScans = candidates.length - skippedDup;
  if (newScans === 0) {
    S.aiMsgs.push({type:'ai', c:`${sp.e} ${sp.n} 这边的同学之前都已经聊过了，没有新的人可以扫。换个运动试试？`, button:'去看看'});
  } else if (matched === 0) {
    const mergedNote = mergedMulti > 0 ? `（其中 ${mergedMulti} 位是在原 conversation 上继续聊的）` : '';
    S.aiMsgs.push({type:'ai', c:`分身和每位 ${sp.e} ${sp.n} 同学都聊过了${mergedNote}，目前还没找到 5 分以上的同频朋友。可以去看看分身的对话记录，了解大家差在哪。`, button:'去看看'});
  } else {
    const mergedNote = mergedMulti > 0 ? `（${mergedMulti} 位老朋友的对话已在原 conversation 里续上了 ${sp.e} ${sp.n}）` : '';
    S.aiMsgs.push({type:'ai', c:`你的 ${sp.e} ${sp.n} 同频朋友的分身已经聊完了。${mergedNote}`, button:'去看看'});
  }
  // Fade out the island; stay on AI page so the user reads the bubble and decides to tap.
  S.scanProgress = null;
  S.scanInProgress = false;
  render();
}

// AI message processing — already async
async function sendAI(inp, me) {
  const t=inp.value.trim(); if(!t)return; inp.value='';
  // Defensive: any stale island state from a previous scan is cleared on new input.
  if (S.scanProgress && !S.scanInProgress) { S.scanProgress = null; }
  S.aiMsgs.push({type:'user',c:t});
  render();

  // STAGE 1: detect sport name → analyze profile + ask for focus
  const sportMatch = SPORTS.find(sp=>t.includes(sp.n)||t.includes(sp.key));
  if (sportMatch) {
    const mySport = (me.sports||[]).find(s => s.key === sportMatch.key);
    if (!mySport) {
      S.aiMsgs.push({type:'ai', c:`你的档案里还没有 ${sportMatch.e} ${sportMatch.n}，先去 Me 页面补充一下，我才能帮你找到对的人。`});
      S.aiPendingSearch = null;
      render(); return;
    }
    S.aiPendingSearch = {sportKey: sportMatch.key};
    const desc = describeIdealProfile(me, sportMatch.key);
    S.aiMsgs.push({type:'ai', c:`好！我读了下你的档案，你想找的 ${sportMatch.e} ${sportMatch.n} 同频画像应该是：\n\n${desc}\n\n你有特别希望我重点沟通的点吗？比如水平、场地、强度...直接说就行；或者说「开始」我立刻出发 ✦`});
    render(); return;
  }

  // STAGE 2: if we asked for focus, treat this reply as the focus and kick off the scan
  if (S.aiPendingSearch) {
    const sportKey = S.aiPendingSearch.sportKey;
    const sp = SPORTS.find(s => s.key === sportKey) || {key:sportKey, e:'🎾', n:sportKey};
    const skipFocus = /开始|跳过|不用|算了|找吧|出发|go/i.test(t);
    if (skipFocus) {
      S.aiMsgs.push({type:'ai', c:`好，我直接开始 —— 扫描所有玩 ${sp.e} ${sp.n} 的同学。进度看顶部小岛 ✦`});
    } else {
      S.aiMsgs.push({type:'ai', c:`OK，重点沟通「${t}」。我去和每个 ${sp.e} ${sp.n} 的同学的分身聊一聊。进度看顶部小岛 ✦`});
    }
    S.aiPendingSearch = null;
    render();
    await autoFindForSport(me, sportKey, skipFocus ? null : t);
    // autoFindForSport handles its own done-pill → auto-jump to Chats transition.
    return;
  }

  if (/多少人|几个人|活动池/.test(t)) {
    getPoolCount().then(cnt=>{
      S.aiMsgs.push({type:'ai',c:`活动池里现在有 ${cnt} 个人填了档案。`});
      render();
    });
    return;
  }

  if (me.sports && me.sports.length > 0) {
    const list = me.sports.map(s => { const sp = SPORTS.find(x=>x.key===s.key); return sp ? sp.e + sp.n : s.key; }).join(' · ');
    S.aiMsgs.push({type:'ai', c:`告诉我具体想找什么运动的朋友，比如「想约网球」「找羽毛球」。\n\n你登记过的：${list}`});
  } else {
    S.aiMsgs.push({type:'ai', c:'你还没填运动档案。先去 Me 页面登记你的运动和水平。'});
  }
  render();
}

// Build a human-readable description of the ideal同频 partner profile from the user's data.
function describeIdealProfile(me, sportKey) {
  const mySport = (me.sports||[]).find(s => s.key === sportKey);
  if (!mySport) return '';
  const qs = SPORT_QS[sportKey] || [];
  const ans = mySport.answers || [];
  const lines = [];
  for (let i = 0; i < ans.length; i++) {
    const a = ans[i]?.a;
    if (!a) continue;
    const q = qs[i];
    if (!q) continue;
    const label = q.q.replace(/？$/, '').replace(/^(一般在|偏好|有|需要|愿意|常去|主要|在哪|约局)/, '');
    lines.push(`• ${q.q.replace(/？$/,'')}：${a}`);
  }
  if (me.timePref?.days?.length) {
    const t = me.timePref.days.join('/') + (me.timePref.times?.length ? ' ' + me.timePref.times.join('/') : '');
    lines.push(`• 时间偏好：${t}`);
  }
  return lines.join('\n');
}

function buildConditions(mySport, timePref, userText) {
  const ans=mySport?.answers||[];
  const qs=SPORT_QS[mySport?.key]||[];
  const conds=[];
  // Area
  const area=ans.find(a=>/哪里|区域|路线/.test(a.q));
  if(area) conds.push({k:'区域',v:area.a});
  // Level
  const level=ans.find(a=>/水平|段位|NTRP|配速|时速/.test(a.q));
  if(level) conds.push({k:'水平',v:level.a});
  // Style/type
  const style=ans.find(a=>/单打|双打|人制|类型|泳姿|台型/.test(a.q));
  if(style) conds.push({k:'方式',v:style.a});
  // Time
  if(timePref?.days?.length){
    conds.push({k:'时间',v:(timePref.days||[]).join('/')+(timePref.times?.length?(' '+timePref.times.join('/')):'')});
  }
  // From user text
  if(/这周|周末|今天|明天/.test(userText)) conds.push({k:'期望',v:userText.match(/(这周|周末|今天|明天|周[一二三四五六日])/)?.[0]||'近期'});
  if(conds.length===0) conds.push({k:'运动',v:SPORTS.find(s=>s.key===mySport?.key)?.n||'未指定'});
  return conds;
}

// Green intensity by match score — darker green = higher fit.
// Wider visual gap between tiers so the contrast is obvious at a glance.
function matchRingColor(score) {
  if (score >= 70) return '#14532d'; // 森林深绿 (very high)
  if (score >= 55) return '#16a34a'; // 饱和绿 (high)
  if (score >= 45) return '#4ade80'; // 亮绿 (medium)
  return '#bbf7d0';                   // 淡绿 (low)
}

function buildChatItem(chat, idx, gradients, opts={}) {
  const initial=(chat.name||'?')[0];
  const item=el('div',{class:'chat-item',onclick:()=>{chat.unread=0;S.curChat=chat.id;render();}});
  // Avatar — no match color here (moved to right side)
  const aw=el('div',{class:'ci-ava-wrap'});
  aw.appendChild(el('div',{class:'ci-ava',style:`background:${gradients[idx%gradients.length]}`,html:initial}));
  aw.appendChild(el('div',{class:'ci-dot ai'}));
  item.appendChild(aw);
  // Info column
  const info=el('div',{class:'ci-info'});
  info.appendChild(el('div',{class:'ci-row1'},[el('div',{class:'ci-name',html:chat.name}),el('div',{class:'ci-time',html:chat.timeAgo})]));
  info.appendChild(el('div',{class:'ci-msg',html:chat.preview}));
  info.appendChild(el('div',{class:'ci-badges'},[
    el('div',{class:'ci-badge a2a',html:'✦ AI分身'}),
    el('div',{class:'ci-badge',style:'background:#f4f6ff;color:#3B5BF6;',html:chat.sport}),
  ]));
  item.appendChild(info);
  // Right-side match indicator — colored by score intensity
  if (!opts.muted) {
    const matchColor = matchRingColor(chat.score || 0);
    if (chat.unread > 0) {
      item.appendChild(el('div',{class:'ci-unread',style:`background:${matchColor};`,html:String(chat.unread)}));
    } else {
      item.appendChild(el('div',{class:'ci-match-dot',style:`background:${matchColor};`}));
    }
  } else {
    // Minimized (暂不同频): grey, no color indicator
    if (chat.unread > 0) item.appendChild(el('div',{class:'ci-unread',style:'background:#9ca3af;',html:String(chat.unread)}));
  }
  return item;
}

  if(S.a2aChats.length===0){
    pg.appendChild(el('div',{style:'padding:60px 30px;text-align:center;color:#aaa;'},[
      el('div',{html:'💬',style:'font-size:48px;margin-bottom:12px;'}),

  // Matched chats — shown normally
  const list=el('div',{class:'chat-list'});
  matched.forEach((chat,idx)=>list.appendChild(buildChatItem(chat,idx,gradients)));
  pg.appendChild(list);

  // Unmatched — collapsed section at bottom
  if(unmatched.length>0){
    const isOpen = S.unmatchedOpen || false;
    const section=el('div',{style:'margin-top:8px;'});
    const toggle=el('div',{
      style:'display:flex;align-items:center;gap:8px;padding:10px 20px;cursor:pointer;',
      onclick:()=>{ S.unmatchedOpen=!S.unmatchedOpen; render(); }
    },[
      el('div',{style:'flex:1;height:1px;background:#f0f0f5;'}),
      el('div',{style:'font-size:12px;color:#bbb;white-space:nowrap;display:flex;align-items:center;gap:5px;'},[
        el('span',{html: isOpen ? '▴' : '▾'}),
        el('span',{html:`${unmatched.length} 个暂不同频`}),
      ]),
      el('div',{style:'flex:1;height:1px;background:#f0f0f5;'}),
    ]);
    section.appendChild(toggle);
    if(isOpen){
      const uList=el('div',{class:'chat-list',style:'opacity:.55;'});
      unmatched.forEach((chat,idx)=>uList.appendChild(buildChatItem(chat,idx,['linear-gradient(135deg,#d1d5db,#9ca3af)'],{muted:true})));
      section.appendChild(uList);
    }
    pg.appendChild(section);
  }

  root.appendChild(pg);
}

function renderChatDetail(root) {
  const chat=S.a2aChats.find(c=>c.id===S.curChat);
  if(!chat){S.curChat=null;renderChats(root);return;}
  const initial=(chat.name||'?')[0];
  const isUnmatched = chat.status==='no-match';
  const pg=el('div',{class:'chat-detail'+(isUnmatched?' unmatched':''),style:'height:100%;'});

  // Header with "AI分身" badge top-left
  const hdr=el('div',{class:'cd-header',style:'flex-wrap:wrap;'});
  hdr.appendChild(el('div',{class:'cd-back',html:'‹',onclick:()=>{S.curChat=null;render();}}));
  hdr.appendChild(el('div',{class:'cd-ava',style:`background:${isUnmatched?'linear-gradient(135deg,#d1d5db,#9ca3af)':'linear-gradient(135deg,#6c63ff,#a78bfa)'}`,html:initial}));
  const nameCol=el('div',{});
  nameCol.appendChild(el('div',{class:'cd-name',html:chat.name,style:isUnmatched?'color:#6b7280;':''}));
  const subRow=el('div',{style:'display:flex;align-items:center;gap:6px;margin-top:2px;'});
  const badgeBg = isUnmatched ? '#9ca3af' : 'linear-gradient(135deg,#3B5BF6,#818cf8)';
  subRow.appendChild(el('span',{style:`font-size:10px;font-weight:700;color:#fff;background:${badgeBg};padding:2px 7px;border-radius:8px;`,html:'✦ AI分身'}));
  subRow.appendChild(el('span',{style:'font-size:11px;color:#aaa;',html:chat.sport}));
  nameCol.appendChild(subRow);
  hdr.appendChild(nameCol);
  hdr.appendChild(el('div',{class:'cd-actions'},[el('span',{html:'⋯',onclick:()=>toast('更多选项')})]));
  pg.appendChild(hdr);

  const msgs=el('div',{class:'cd-msgs',id:'cdMsgs'});
  (chat.messages||[]).forEach(m=>{
    if(m.type==='sys'){
      msgs.appendChild(el('div',{class:'dmsg-sys'},[el('div',{class:'dmsg-sys-tag',html:m.c})]));
      return;
    }
    const isMe=m.type==='mine';
    const row=el('div',{class:'dmsg-row'+(isMe?' r':'')});
    if(!isMe){
      row.appendChild(el('div',{class:'dmsg-ava',style:`background:${isUnmatched?'linear-gradient(135deg,#d1d5db,#9ca3af)':'linear-gradient(135deg,#818cf8,#a78bfa)'}`,html:initial}));
    }
    row.appendChild(el('div',{class:'dmsg-bubble',html:m.c.replace(/\n/g,'<br>')}));
    if(isMe){
      const myInit=(S.nickname||'我')[0];
      const myAvaBg = isUnmatched ? 'linear-gradient(135deg,#d1d5db,#9ca3af)' : 'linear-gradient(135deg,#3B5BF6,#818cf8)';
      row.appendChild(el('div',{class:'dmsg-ava',style:`background:${myAvaBg}`,html:myInit}));
    }
    msgs.appendChild(row);
  });
  pg.appendChild(msgs);
  if (isUnmatched) {
    pg.appendChild(el('div',{class:'cd-archived-bar',html:`暂不同频 · 综合 ${chat.matchPercent||0}/10 分 — 仅保留分身对话记录，不发消息`}));
  } else {
    pg.appendChild(el('div',{class:'cd-input-bar'},[
      el('div',{class:'cd-input',html:'接管对话并发消息...'}),
      el('button',{class:'cd-send',html:'▲',onclick:()=>toast('分身对话中，点击「接管」可直接发消息（演示）')}),
    ]));
  }
  root.appendChild(pg);
  setTimeout(()=>{const m=$('#cdMsgs');if(m)m.scrollTop=m.scrollHeight;},50);
}
</script>
